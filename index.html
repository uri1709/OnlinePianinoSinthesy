<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Piano Studio Pro</title>
        <style>
            body {
                font-family: "Segoe UI", sans-serif;
                background: #0a0a0a;
                color: #eee;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            .tabs {
                display: flex;
                background: #1a1a1a;
                padding: 5px 10px 0;
                gap: 5px;
                border-bottom: 1px solid #333;
            }
            .tab-btn {
                padding: 10px 20px;
                cursor: pointer;
                background: #252525;
                color: #888;
                border-radius: 5px 5px 0 0;
                border: none;
                outline: none;
                transition: 0.2s;
            }
            .tab-btn.active {
                background: #3498db;
                /* background: #27ae60; */
                color: white;
                font-weight: bold;
            }

            #song-control-bar {
                background: #111;
                padding: 10px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid #333;
            }

            #progress-container {
                width: 100%;
                height: 20px; /* Уменьшаем высоту до тонкой линии */
                background: #222; /* Темный фон подложки */
                cursor: pointer;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: visible; /* Чтобы текст не обрезался, если он выше линии */
            }

            #progress-fill {
                height: 100%;
                /* Зеленый цвет как на скрине */
                background: #3498db;

                position: absolute;
                left: 0;
                top: 0;
                transition: width 0.1s linear;
            }

            #time-display {
                position: relative;
                z-index: 10; /* Текст поверх зеленой полоски */
                font-size: 11px;
                font-family: Arial, sans-serif;
                color: #ffffff;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); /* Тень для читаемости на любом фоне */
                pointer-events: none; /* Чтобы клики проходили сквозь текст на шкалу */
                margin-top: -2px; /* Небольшая корректировка центра */
            }
            #visualizer-container {
                flex: 1; /* Растягивает область с нотами на всё свободное место */
                position: relative;
                width: 100%;
                background: #050505;
                overflow: hidden;
            }

            #visual-canvas {
                width: 100%;
                height: 100%; /* Холст внутри должен заполнять весь растянутый контейнер */
                display: block;
            }

            /* В блоке #piano-keyboard */
            #piano-keyboard {
                display: flex;
                width: 100%;

                /* 15vw означает 15% от ширины экрана.
                                            Если ширина станет меньше в 2 раза, высота тоже станет меньше в 2 раза. */
                height: 15vw; /* Высота теперь 15% от ширины экрана */

                /* Уберите или сильно уменьшите min-height, чтобы она не блокировала сжатие */
                min-height: 50px; /* Минимальный порог, чтобы клавиши не исчезли */
                max-height: 200px; /* Максимальный порог для огромных мониторов */

                background: #000;
                position: relative;
                overflow: hidden;

                /* Запрещаем клавиатуре забирать лишнее место у нот */
                flex-shrink: 0;
                flex-grow: 0;

                /* margin-top: 20px; */
            }
            .key {
                cursor: pointer;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: center;
                position: relative;
                transition: 0.05s;
                user-select: none;
                flex-shrink: 0;
            }
            .white-key {
                flex: 1 1 0; /* Равномерно заполняют всё пространство */
                min-width: 0; /* Позволяет сжиматься меньше содержимого */
                /* height: 100%; */
                height: 100%; /* Занимает всю высоту родителя (#piano-keyboard) */

                background: #fff;
                color: #000; /* Явно задаем черный цвет текста */
                border: 1px solid #999;
                box-sizing: border-box;
                position: relative;

                /* Уменьшаем шрифт для низких клавиш */
                font-size: 9px;
                /* Прижимаем текст максимально к низу */
                padding-bottom: 2px;
            }
            .white-key.active {
                background: #3498db !important;
                transform: translateY(2px);
            }

            .black-key-wrapper {
                width: 0; /* Обертка не занимает места в потоке */
                position: relative;
                z-index: 10;
            }

            .black-key {
                position: absolute;
                /* Ширина черной клавиши в процентах от белой или фиксированная */
                width: 24px;
                height: 60%; /* Черные клавиши всегда составляют 60% от высоты белых */
                background: #222;
                color: #fff; /* Белый текст на черном фоне */

                /* Центрируем точно по линии стыка белых клавиш */
                transform: translateX(-50%);
                border-radius: 0 0 3px 3px;
                border: 1px solid #000;

                font-size: 0;
            }
            .black-key.active {
                background: #e74c3c !important;
            }

            .hint {
                font-size: 0.6rem;
                margin-bottom: 8px;
                font-weight: bold;
                pointer-events: none;
                opacity: 0.8;
            }
            #settings-tab {
                padding: 0px;
            }
            .setting-item {
                background: #1a1a1a;
                border-radius: 8px;
                border: 1px solid #333;
                align-items: center;
            }
            .inst-item {
                display: flex;
                align-items: center;
                gap: 10px;
                background: #1a1a1a;
                padding: 12px;
                border-radius: 6px;
                margin-bottom: 8px;
                border: 1px solid #333;
            }
            .color-previews {
                display: flex;
                gap: 4px;
                align-items: center;
            }
            .color-preview {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            .piano-container {
                width: calc(100% - 20px); /* Отступы по 10px с каждой стороны */
                max-width: 1600px;
                margin: 0 auto;
                overflow-x: auto; /* Если клавиши всё равно не влезут, появится прокрутка */
                padding: 20px 0;
            }

            .controls {
                display: flex;
                justify-content: center;
                gap: 15px;
                background: #1a1a1a; /* Темный фон как на фото */
                padding: 10px;
            }

            .ctrl-btn {
                width: 30px;
                height: 30px;
                background: #222;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                /* Эффект объема (неоморфизм) */
                box-shadow:
                    4px 4px 8px #111,
                    -1px -1px 2px #333;
                transition: all 0.2s ease;
            }

            .ctrl-btn:active {
                box-shadow:
                    inset 2px 2px 5px #111,
                    inset -1px -1px 2px #333;
                transform: scale(0.95);
            }

            /* Иконки (простые фигуры на CSS) */
            .icon-play {
                width: 0;
                height: 0;
                border-style: solid;
                border-width: 10px 0 10px 18px;
                border-color: transparent transparent transparent #ccc;
                margin-left: 4px;
            }

            .icon-pause {
                width: 14px;
                height: 18px;
                border-left: 5px solid #ccc;
                border-right: 5px solid #ccc;
            }

            .icon-stop {
                width: 16px;
                height: 16px;
                background: #ccc;
            }

            #piano-tab {
                display: flex;
                flex-direction: column;
                height: calc(
                    100vh - 45px
                ); /* Высота всей области за вычетом вкладок */
            }

            #visualizer-container {
                flex-grow: 1; /* Визуализатор растягивается и занимает всё свободное место */
                position: relative;
                overflow: hidden;
            }

            /**/
            /* 1. Скрываем ВСЕ вкладки по умолчанию */
            .tab-content {
                display: none !important;
                height: calc(100vh - 50px);
                overflow: hidden;
            }

            /* 2. Показываем активную вкладку (универсально) */
            .tab-content.active {
                display: block !important;
            }

            /* 3. Только для ПИАНИНО уточняем режим отображения, когда оно активно */
            #piano-tab.active {
                display: flex !important;
                flex-direction: column;
            }
            /**/

            .editor-layout {
                display: flex;
                width: 100%;
                height: 100%; /* Занимает всю высоту вкладки */
                gap: 20px; /* Отступ между колонками */
                padding: 15px;
                box-sizing: border-box;
            }

            .editor-column {
                flex: 1; /* Каждая колонка берет по 50% */
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            #json-editor {
                flex-grow: 1; /* Растягиваем текстовое поле на всю высоту колонки */
                width: 100%;
                resize: none; /* Убираем ручное изменение размера */
                background: #1e1e1e;
                color: #d4d4d4;
                font-family: monospace;
                padding: 10px;
                border: 1px solid #444;
                margin-bottom: 10px;
            }

            .right-col {
                background: #252525;
                padding: 15px;
                border-radius: 4px;
            }

            .editor-layout {
                display: flex;
                height: 100%;
                gap: 15px;
                padding: 10px;
                box-sizing: border-box;
            }

            .editor-column {
                flex: 1; /* Все три колонки равны по ширине */
                display: flex;
                flex-direction: column;
                overflow: hidden; /* Чтобы таблица не раздувала колонку */
            }

            .table-wrapper {
                flex-grow: 1;
                overflow-y: auto; /* Скролл только для таблицы */
                background: #1e1e1e;
                border: 1px solid #444;
            }

            #midi-instruments-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
            }

            #midi-instruments-table th,
            #midi-instruments-table td {
                padding: 8px;
                text-align: left;
                border-bottom: 1px solid #333;
            }

            #midi-instruments-table th {
                background: #333;
                position: sticky; /* Шапка всегда сверху при скролле */
                top: 0;
            }

            body,
            .piano-app {
                /* 100vh — запасной вариант, если JS не сработает */
                height: 100vh;
                /* Используем переменную, которую вычислим в JS */
                height: calc(var(--vh, 1vh) * 100);
                overflow: hidden;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
            }

            /* Убедитесь, что сама клавиатура имеет гибкую высоту или прижата к низу */
            .keyboard-section {
                flex-shrink: 0; /* Не дает клавиатуре сжиматься */
                margin-bottom: env(
                    safe-area-inset-bottom
                ); /* Учет "челок" и полосок навигации */
            }

            /* Контейнер управления */
            .edit-controls {
                display: flex;
                align-items: center;
                background: rgba(255, 255, 255, 0.05);
                padding: 5px 15px;
                border-radius: 20px;
                margin-left: 10px;
            }

            /* Стили переключателя (Toggle Switch) */
            .switch {
                position: relative;
                display: inline-block;
                width: 40px;
                height: 20px;
                margin-right: 10px;
            }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #444;
                transition: 0.4s;
                border-radius: 20px;
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 14px;
                width: 14px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                transition: 0.4s;
                border-radius: 50%;
            }

            input:checked + .slider {
                background-color: #2196f3;
            }
            input:checked + .slider:before {
                transform: translateX(20px);
            }

            .label-text {
                font-size: 14px;
                color: #fff;
                user-select: none;
            }

            /* Подсветка канваса в режиме редактирования */
            /*#visual-canvas.edit-active {
                            cursor: crosshair;
                            box-shadow: inset 0 0 20px rgba(33, 150, 243, 0.2);
                            background-color: #111;
                        }*/ /* Чуть светлее фон */

            /* Добавьте к существующему CSS */
            #visual-canvas.edit-active {
                /* Добавляем полосу прокрутки визуально, чтобы подчеркнуть возможность скролла */
                border-right: 4px solid #2196f3;
                transition: background 0.2s;

                /* --- ДОБАВИТЬ ЭТУ СТРОКУ --- */
                cursor: none !important;
                /* cursor: crosshair; */
            }

            /* Подсказка при наведении на канвас в режиме правки */
            #visual-canvas.edit-active:hover::after {
                content: "Scroll to navigate / Click to draw";
                position: absolute;
                top: 10px;
                right: 10px;
                color: #2196f3;
                font-size: 10px;
                background: rgba(0, 0, 0, 0.6);
                padding: 2px 5px;
                pointer-events: none;
            }

            /* Скрывает стандартный курсор мыши внутри canvas */
            /* canvas {
                cursor: none; 
            } */

            .table-container {
                max-height: 450px;
                overflow-y: auto;
                margin-top: 15px;
                border: 1px solid #444;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                background: #111;
                font-size: 0.9rem;
            }
            th,
            td {
                border: 1px solid #444;
                padding: 8px;
                text-align: center;
            }
            th {
                position: sticky;
                top: 0;
                background: #333;
                z-index: 5;
            }
            td input {
                background: transparent;
                border: none;
                color: #00ff00;
                width: 95%;
                text-align: center;
                font-family: monospace;
            }
            td input.input-key {
                background: #111;
                border: 1px solid #444;
                cursor: pointer;
                font-weight: bold;
            }
            td input.input-key:focus {
                border-color: #00ff00;
                background: #002200;
                outline: none;
            }
        </style>
    </head>
    <body>
        <div class="tabs">
            <button
                class="tab-btn active"
                onclick="objPianino.switchTab('piano-tab', this)"
            >
                ПИАНИНО
            </button>
            <button
                class="tab-btn"
                onclick="objPianino.switchTab('editor-tab', this)"
            >
                РЕДАКТОР
            </button>
            <button
                class="tab-btn"
                onclick="objPianino.switchTab('settings-tab', this)"
            >
                НАСТРОЙКИ
            </button>
        </div>

        <div id="piano-tab" class="tab-content active" style="overflow: hidden">
            <div class="controls">
                <div
                    class="setting-item"
                    style="
                        display: flex;
                        align-items: left;
                        gap: 10px;
                        background: none;
                        border: none;
                        margin: 0;
                    "
                >
                    <div>
                        <label>Tab играет с: </label>
                        <select
                            id="octave-offset-select"
                            onchange="objPianino.setOctaveOffset(this.value)"
                            style="
                                padding: 5px;
                                background: #333;
                                color: #fff;
                                border: 1px solid #555;
                            "
                        >
                            <option value="0">Первой</option>
                            <option value="12">Второй</option>
                            <option value="24" selected>Третьей</option>
                            <option value="36">Четвертой</option>
                            <option value="48">Пятой</option>
                            <option value="60">Шестой</option>
                        </select>
                    </div>
                    <button
                        class="ctrl-btn"
                        id="playBtn"
                        onclick="objPianino.start()"
                    >
                        <i class="icon-play"></i>
                    </button>
                    <button
                        class="ctrl-btn"
                        id="pauseBtn"
                        onclick="objPianino.pause()"
                    >
                        <i class="icon-pause"></i>
                    </button>
                    <button
                        class="ctrl-btn"
                        id="stopBtn"
                        onclick="objPianino.stop()"
                    >
                        <i class="icon-stop"></i>
                    </button>
                    <label style="font-size: 0.8rem; color: #888">BPM:</label>
                    <input
                        type="number"
                        id="bpm-input"
                        value="60"
                        min="20"
                        max="300"
                        onchange="objPianino.onchangeInputBpm(this.value)"
                        style="
                            width: 50px;
                            background: #333;
                            color: #fff;
                            border: 1px solid #555;
                            padding: 5px;
                            border-radius: 4px;
                        "
                    />
                    <label
                        ><input
                            type="checkbox"
                            id="learn-mode-check"
                            onchange="objPianino.learningMode = this.checked"
                        />🎓 ОБУЧЕНИЕ</label
                    >
                    <label>
                        <input
                            type="checkbox"
                            id="loop-mode-check"
                            onchange="objPianino.loopMode = this.checked"
                        />
                        ЗАЦИКЛИТЬ
                    </label>

                    <!-- Блок режима редактирования -->
                    <div class="edit-controls">
                        <label class="switch">
                            <input type="checkbox" id="edit-mode-check" />
                            <span class="slider"></span>
                        </label>
                        <span class="label-text">Режим редактирования</span>

                        <!-- Вспомогательные кнопки (скрыты по умолчанию) -->
                        <div
                            id="edit-tools"
                            style="display: none; margin-left: 15px"
                        >
                            <select
                                id="note-step"
                                title="Шаг сетки (прилипание)"
                            >
                                <option value="0.125">1/8</option>
                                <option value="0.25" selected>1/4</option>
                                <option value="0.5">1/2</option>
                                <option value="1">1</option>
                            </select>
                            <span
                                style="
                                    font-size: 12px;
                                    color: #ccc;
                                    margin-left: 10px;
                                "
                            >
                                ЛКМ: Создать/Тянуть | ПКМ: Удалить
                            </span>
                        </div>
                    </div>

                    <button
                        class="ctrl-btn"
                        id="fullscreenBtn"
                        onclick="toggleFullScreen()"
                        title="Полноэкранный режим"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#ccc"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                            />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="visualizer-container">
                <div id="progress-container" onclick="objPianino.seek(event)" ;>
                    <div id="progress-fill"></div>
                    <div id="time-display">0:00 / 0:00</div>
                </div>
                <canvas id="visual-canvas"></canvas>
            </div>
            <div id="piano-keyboard"></div>
        </div>

        <div id="editor-tab" class="tab-content">
            <div class="editor-layout">
                <!-- 1 колонка: Редактор нот -->
                <div class="editor-column left-col">
                    <div style="padding: 20px">
                        <div>
                            <button
                                onclick="objPianino.updateSongFromEditor()"
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    /* background: #27ae60; */
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ПРИМЕНИТЬ JSON
                            </button>
                            <input
                                type="file"
                                id="midi-input"
                                accept=".mid, .midi"
                                style="display: none"
                                onchange="objPianino.importMidi(this)"
                            />
                            <button
                                onclick="
                                    document
                                        .getElementById('midi-input')
                                        .click()
                                "
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ЗАГРУЗИТЬ MIDI
                            </button>

                            <!-- Кнопка сохранения -->
                            <button
                                onclick="saveMusicToJSON()"
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    /* background: #27ae60; */
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                СОХРАНИТЬ JSON
                            </button>

                            <!-- Кнопка загрузки -->
                            <input
                                type="file"
                                id="json-upload"
                                accept=".json"
                                style="display: none"
                                onchange="loadMusicFromJSON(this)"
                            />
                            <button
                                onclick="
                                    document
                                        .getElementById('json-upload')
                                        .click()
                                "
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    /* background: #f39c12; */
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ЗАГРУЗИТЬ JSON
                            </button>

                            <textarea
                                id="editor-area"
                                style="
                                    width: 100%;
                                    height: 60vh;
                                    background: #000;
                                    color: #0f0;
                                    font-family: monospace;
                                    padding: 10px;
                                    border: 1px solid #444;
                                "
                                placeholder="JSON данные нот..."
                            ></textarea>
                        </div>
                    </div>
                </div>

                            (russianNoteName || "ДО") + octave;

                        absoluteTime =
                            Math.round(
                                this.pixelsToTime(y) / this.stepSnapping,
                            ) * this.stepSnapping;

                        // Система ОТ 1: Делим абсолютное время на 4 четверти и сдвигаем на +1 такт
                        const calculatedNumTact = Math.floor(absoluteTime / 4);

                        // Локальная позиция внутри этого такта (от 0 до 3.75)
                        const localPos = absoluteTime % 4;

                        if (e.button === 0) {
                            // ЛКМ - Создание ноты
                            const newNote = {
                                note: finalNoteName,
                                pos: localPos, // Локальное смещение в такте
                                length: this.stepSnapping,
                                idInstrument: 25,
                                nameInstrument: "Acoustic Guitar (steel)",
                                numTact: calculatedNumTact, // Номер такта (1, 2, 3...)
                            };

                            // 1. Добавляем в глобальный объект музыки
                            objMusic.notesSong.push(newNote);

                            // 2. Синхронизируем данные
                            this.updateSongData();

                            // 3. Привязываем активную ноту для растягивания
                            this.activeNote =
                                this.notesSong[this.notesSong.length - 1];
                            this.isDrawing = true;
                        } else if (e.button === 2) {
                            // ПКМ - Удаление ноты
                            objMusic.notesSong = objMusic.notesSong.filter(
                                (n) => {
                                    return !(
                                        n.note === finalNoteName &&
                                        n.numTact === calculatedNumTact &&
                                        Math.abs(n.pos - localPos) < 0.2
                                    );
                                },
                            );
                            this.updateSongData();
                        }

                        this.rebuild();
                    });

                    // Отслеживаем движение мыши строго НАД ХОЛСТОМ
                    this.cvs.addEventListener("mousemove", (e) => {
                        if (!isEditMode) return;

                        this.isMouseInCanvas = true;
                        const rect = this.cvs.getBoundingClientRect();
                        const mouseX = e.clientX - rect.left;
                        const mouseY = e.clientY - rect.top;

                        this.gridCursorX = mouseX;
                        this.gridCursorY = mouseY;

                        this.rebuild();
                    });

                    // 4. ОТПУСКАНИЕ МЫШИ
                    window.addEventListener("mouseup", () => {
                        if (this.isDrawing) {
                            this.isDrawing = false;
                            this.activeNote = null;

                            // После завершения рисования обновляем текст в редакторе
                            this.updateSongData();
                            // ЗАТЕМ принудительно перерисовываем, чтобы ноты не исчезали
                            this.rebuild();
                        }
                    });

                    window.addEventListener("resize", () => this.resize());
                },

                setOctaveOffset(val) {
                    this.octaveOffset = parseInt(val);
                    this.rebuild();
                },

                updateSongData() {
                    const strJSONNotesSong = JSON.stringify(
                        objMusic.notesSong,
                        null,
                        4,
                    );
                    document.getElementById("editor-area").value =
                        strJSONNotesSong;

                    this.notesSong = JSON.parse(strJSONNotesSong).map((m) => {
                        const absoluteStart = m.numTact * 4 + m.pos;
                        return {
                            ...m,
                            passed: false,
                            absStart: absoluteStart,
                            idx: -1,
                        };
                    });
                    this.bpm = objMusic.bpm || 130;
                    this.initInputBpm();

                    this.maxPos =
                        Math.max(
                            ...this.notesSong.map((m) => m.absStart + m.length),
                            0,
                        ) || 0;
                    this.activeInstruments.clear();
                    const uniqueIds = Array.from(
                        new Set(this.notesSong.map((m) => m.idInstrument)),
                    );
                    uniqueIds.forEach((id, index) => {
                        const base =
                            BASE_PALETTES[index % BASE_PALETTES.length];
                        this.instColors[id] = {
                            w: base,
                            b: this.adjustColor(base, 0.45),
                        };
                        this.activeInstruments.add(id);
                    });
                    this.renderSettings();
                },

                rebuild() {
                    const whites = [0, 2, 4, 5, 7, 9, 11];
                    this.keysPianino = [];

                    for (let i = 0; i < this.countNotes; i++) {
                        const abs = i; // Это реальный номер ноты в MIDI
                        const semi = i % 12;

                        this.keysPianino.push({
                            id: i,
                            name: this.names[semi] + Math.floor(i / 12),
                            isWhite: whites.includes(semi),
                            freq: 16.35 * Math.pow(2, i / 12),
                            // ИЗМЕНЕНИЕ ТУТ: ищем в объекте по номеру ноты abs
                            code:
                                this._baseCodes.find(
                                    (item) =>
                                        // item.id + this.octaveOffset === i, // смещенеи на октаву
                                        item.id + this.octaveOffset === i,
                                )?.key ?? "",
                        });
                    }
                    this.notesSong.forEach((m) => {
                        //console.log(m);
                        let pureNote = m.note
                            .replace(/[0-9]/g, "")
                            .toUpperCase();
                        let octave = m.note.replace(/\D/g, "");
                        m.idx = this.keysPianino.findIndex(
                            (n) =>
                                n.name ===
                                (this.mapNotes[pureNote] || pureNote) + octave,
                        );
                    });

                    // 1. Отрисовка вашей клавиатуры и текущих нот
                    this.renderKb();

                    this.fillTable();
                },

                renderKb() {
                    const kb = document.getElementById("piano-keyboard");
                    if (!kb) return;

                    kb.innerHTML = "";

                    // Обновляем ширину холста под контейнер
                    // const container = this.cvs.parentElement;
                    this.cvs.width = this.cvsWidth;
                    this.cvs.height = this.cvsHeight;

                    // Считаем количество белых клавиш для сетки
                    const whiteNotesCount = this.keysPianino.filter(
                        (n) => n.isWhite,
                    ).length;

                    // Ключевой параметр для синхронизации с Canvas
                    this.keyWidth = this.cvs.width / whiteNotesCount;

                    this.keysPianino.forEach((n) => {
                        const el = document.createElement("div");
                        el.className =
                            "key " + (n.isWhite ? "white-key" : "black-key");
                        el.id = "k-" + n.id;

                        // Добавляем текст подсказки (hint)
                        const hint = n.code
                            ? n.code
                                  .replace("Key", "")
                                  .replace("Digit", "")

                                  .replace("ShiftLeft", "SHFT")
                                  .replace("BracketLeft", "[")
                                  .replace("BracketRight", "]")
                                  .replace("Backslash", "\\")
                                  .replace("Minus", "-")
                                  .replace("Equal", "=")
                                  .replace("Backspace", "<-")
                            : "";
                        el.innerHTML = `<span class="hint">${hint}</span>`;

                        el.onmousedown = (e) => {
                            e.preventDefault();
                            this.play(n.id);
                        };

                        if (n.isWhite) {
                            // Устанавливаем динамическую ширину для белых клавиш
                            el.style.width = this.keyWidth + "px";
                            kb.appendChild(el);
                        } else {
                            // Пропорциональная ширина для черных клавиш
                            const bW = this.keyWidth * 0.65;
                            el.style.width = bW + "px";

                            const wrapper = document.createElement("div");
                            wrapper.className = "black-key-wrapper";

                            wrapper.appendChild(el);
                            kb.appendChild(wrapper);
                        }
                    });
                },

                renderSettings() {
                    const container =
                        document.getElementById("instruments-list");
                    container.innerHTML = "";
                    const unique = Array.from(
                        new Set(this.notesSong.map((m) => m.idInstrument)),
                    );
                    unique
                        .sort((a, b) => a - b)
                        .forEach((id) => {
                            const m = this.notesSong.find(
                                (x) => x.idInstrument === id,
                            );
                            if (!m) return;
                            const colors = this.instColors[id] || {
                                w: "#3498db",
                                b: "#2c3e50",
                            };
                            const div = document.createElement("div");
                            div.className = "inst-item";
                            div.innerHTML = `<input type="checkbox" checked onchange="objPianino.toggleInstrument(${id}, this.checked)"> <b style="color:#3498db; width: 40px">#${id}</b> <span style="flex: 1">${m.nameInstrument || "Unknown"}</span><div class="color-previews"><div class="color-preview" style="background: ${colors.w}"></div><div class="color-preview" style="background: ${colors.b}"></div></div>`;
                            container.appendChild(div);
                        });
                },

                toggleInstrument(id, active) {
                    if (active) this.activeInstruments.add(id);
                    else this.activeInstruments.delete(id);
                },

                play(id, idInstrument = 0) {
                    if (!this.ctx) {
                        this.ctx = new (
                            window.AudioContext || window.webkitAudioContext
                        )();
                    }
                    if (this.ctx.state === "suspended") this.ctx.resume();

                    const n = this.keysPianino[id];
                    if (!n) return;

                    // Логика режима обучения...
                    if (this.learningMode && this.isPlaying) {
                        const targetNote = this.notesSong
                            .filter((m) => m.idx === id && !m.passed)
                            .sort((a, b) => a.absStart - b.absStart)[0];
                        if (targetNote) {
                            const dist =
                                targetNote.absStart - this.currentPosition;
                            if (dist < 1.0) targetNote.passed = true;
                        }
                    }

                    const el = document.getElementById("k-" + id);
                    if (el) {
                        el.classList.add("active");
                        setTimeout(() => el.classList.remove("active"), 150);
                    }

                    const now = this.ctx.currentTime;

                    // Определяем тип волны в зависимости от группы MIDI инструментов
                    let type = "sine";
                    if (idInstrument < 8)
                        type = "triangle"; // Пианино
                    else if (idInstrument >= 16 && idInstrument < 24)
                        type = "sawtooth"; // Органы
                    else if (idInstrument >= 24 && idInstrument < 32)
                        type = "square"; // Гитары/Бас

                    [
                        [1, 0.3],
                        [2, 0.15],
                    ].forEach(([m, v]) => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();

                        // console.log(n.freq * m);
                        osc.type = type; // Установка типа звучания
                        osc.frequency.setValueAtTime(n.freq * m, now);

                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(v, now + 0.01);
                        gain.gain.exponentialRampToValueAtTime(
                            0.001,
                            now + 0.8,
                        );

                        osc.connect(gain).connect(this.ctx.destination);
                        osc.start(now);
                        osc.stop(now + 1);
                    });
                },

                drawVerticalGrid() {
                    this.cvsCtx.strokeStyle = "#222"; // Цвет линий сетки
                    this.cvsCtx.beginPath();

                    const whiteNotesCount = this.keysPianino.filter(
                        (n) => n.isWhite,
                    ).length;

                    for (let i = 0; i <= whiteNotesCount; i++) {
                        // Координата X линии — это номер белой клавиши умноженный на динамическую ширину
                        const x = i * this.keyWidth;
                        this.cvsCtx.moveTo(x, 0);
                        this.cvsCtx.lineTo(x, this.cvsHeight);
                    }
                    this.cvsCtx.stroke();
                },
                drawHorizontalTact() {
                    const ctx = this.cvsCtx;
                    const w = this.cvsWidth;
                    const h = this.cvsHeight;

                    // Параметры такта
                    const beatsPerTact = 4;
                    const totalTacts = Math.ceil(this.maxPos / beatsPerTact);

                    for (let t = -5; t <= totalTacts; t++) {
                        const tactBeatPos = t * beatsPerTact;
                        // Текущая Y-координата линии
                        const y =
                            h -
                            (tactBeatPos - this.currentPosition) *
                                this.pixelsPerQuarter;

                        // Рисуем только если линия в видимой зоне
                        if (y >= -10 && y <= h + 10) {
                            ctx.beginPath();

                            // --- ЭФФЕКТ ПОДСВЕТКИ ---
                            // Если линия пересекает зону "удара" (у самого низа, h)
                            const threshold = 10; // дистанция срабатывания подсветки

                            //{{
                            if (t === 0) {
                                // Настройки стиля линии (Яркий неоново-зеленый цвет)
                                // ctx.strokeStyle = "#2ecc71";
                                ctx.strokeStyle = "#fff"; // Белый цвет при пересечении
                                ctx.lineWidth = 1.0; // Плотная, хорошо заметная линия
                                // ctx.globalAlpha = 0.9;
                                // ctx.setLineDash([]); // Гарантируем сплошную линию без пунктиров

                                // // Рисуем текстовый маркер "START (0:00)" чуть выше линии для красоты
                                // ctx.fillStyle = "#2ecc71";
                                // ctx.font = "bold 13px sans-serif";
                                // ctx.fillText(
                                //     "START (0:00)",
                                //     15,
                                //     startLineY - 8,
                                // );

                                //}}
                                // } else if (Math.abs(y - h) < threshold) {
                                //     ctx.strokeStyle = "#fff"; // Белый цвет при пересечении
                                //     ctx.lineWidth = 3; // Толстая линия
                                //     ctx.shadowBlur = 15; // Свечение
                                //     ctx.shadowColor = "#fff";
                                //     console.log("линия подсвечивания");
                            } else {
                                ctx.strokeStyle = "rgba(100, 100, 100, 0.4)"; // Обычный тусклый цвет
                                ctx.lineWidth = 1;
                                ctx.shadowBlur = 0; // Выключаем свечение для обычных линий
                            }

                            ctx.moveTo(0, y);
                            ctx.lineTo(w, y);
                            ctx.stroke();

                            // Сброс тени для текста, чтобы он не размывался
                            ctx.shadowBlur = 0;

                            // Номер такта
                            ctx.fillStyle = "rgba(150, 150, 150, 0.5)";
                            ctx.font = "12px Arial";
                            ctx.fillText(t + 1, 15, y - 5);
                        }
                    }
                    // Важно сбросить параметры контекста после цикла
                    ctx.shadowBlur = 0;
                    ctx.lineWidth = 1;
                },

                drawSubstrate() {
                    const ctx = this.cvsCtx;
                    const h = this.cvsHeight;
                    const whiteKeys = this.keysPianino.filter((n) => n.isWhite);

                    whiteKeys.forEach((n, i) => {
                        // Проверяем, входит ли нота в группу ДО, РЕ, МИ, ФА (индексы 0,1,2,3 в октаве)
                        // В полной клавиатуре это зависит от остатка деления на 7
                        const noteInOctave = i % 7;
                        const isGreyZone = noteInOctave < 3; // ДО, РЕ, МИ, ФА

                        if (isGreyZone) {
                            ctx.fillStyle = "rgba(255, 255, 255, 0.05)"; // Очень слабый серый/белый
                            ctx.fillRect(
                                //this.paddingLeft + i * this.keyWidth,
                                0 + i * this.keyWidth,
                                0,
                                this.keyWidth,
                                h,
                            );
                        }
                    });
                },

                drawMetrics() {
                    const ctx = this.cvsCtx;
                    ctx.save(); // Сохраняем состояние контекста
                    ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; // Светло-серый текст
                    ctx.font = "14px 'Segoe UI', Arial, sans-serif";
                    ctx.textAlign = "left";

                    // Вывод BPM и FPS
                    ctx.fillText(`${Math.round(this.bpm)} BPM`, 15, 25);
                    ctx.fillText(`${this.fps || 0} FPS`, 15, 45);

                    ctx.restore();
                },

                // Добавьте этот метод внутрь объекта objPianino
                drawEditCursor() {
                    const ctx = this.cvsCtx;
                    // Проверяем глобальный флаг редактора и присутствие мыши на холсте
                    if (
                        typeof isEditMode !== "undefined" &&
                        isEditMode &&
                        this.isMouseInCanvas &&
                        ctx
                    ) {
                        ctx.save();

                        console.log(
                            this.gridCursorX,
                            this.gridCursorY,
                            this.cvsHeight,
                        );

                        // Задаем сочный и контрастный цвет для прицела
                        ctx.strokeStyle = "#ff0000";
                        ctx.lineWidth = 1.5;
                        ctx.globalAlpha = 1.0;
                        ctx.setLineDash([]); // Отключаем любые пунктиры

                        // Рисуем вертикальную направляющую (по центру клавиши)
                        ctx.beginPath();
                        ctx.moveTo(this.gridCursorX, 0);
                        ctx.lineTo(this.gridCursorX, this.cvs.height);
                        ctx.stroke();

                        // Рисуем горизонтальную направляющую (по центру 16-й ноты)
                        ctx.beginPath();
                        ctx.moveTo(0, this.gridCursorY);
                        ctx.lineTo(this.cvs.width, this.gridCursorY);
                        ctx.stroke();

                        // Рисуем аккуратную центральную точку на пересечении осей
                        ctx.fillStyle = "#ff0000";
                        ctx.beginPath();
                        ctx.arc(
                            this.gridCursorX,
                            this.gridCursorY,
                            4,
                            0,
                            Math.PI * 2,
                        );
                        ctx.fill();

                        ctx.restore();
                    }
                },

                // Добавьте этот метод внутрь объекта objPianino

                /*render*/
                animate() {
                    const ctx = this.cvsCtx;
                    if (!ctx) return;

                    // --- РАСЧЕТ FPS И DELTA TIME ---
                    const now = performance.now();
                    // dt — это доля секунды, прошедшая между кадрами (напр. 0.016 для 60fps)
                    const dt = this.lastTime
                        ? (now - this.lastTime) / 1000
                        : 0.016;
                    this.lastTime = now;

                    // Обновляем FPS раз в полсекунды, чтобы цифры не "прыгали" слишком быстро
                    if (!this.fpsNextUpdate || now > this.fpsNextUpdate) {
                        this.fps = Math.round(1 / dt);
                        this.fpsNextUpdate = now + 500;
                    }

                    const h = this.cvsHeight,
                        w = this.cvsWidth;
                    const kb = document.getElementById("piano-keyboard");
                    if (!kb) return;

                    // 1. ОЧИСТКА И ФОН
                    ctx.clearRect(0, 0, w, h);
                    this.drawSubstrate(); // Серый фон ДО-МИ
                    this.drawVerticalGrid(); // Сетка клавиш
                    this.drawHorizontalTact(); // Такты
                    this.drawMetrics(); // Текст BPM/FPS
                    this.drawEditCursor(); // Прицел

                    const kbRect = kb.getBoundingClientRect();
                    let blocked = false;

                    // 2. ОТРИСОВКА НОТ (Всегда, даже на паузе)

                    // Определяем временное «окно» видимости
                    const visibleStartTime = this.currentPosition;
                    const visibleEndTime =
                        this.currentPosition +
                        this.cvsHeight / this.pixelsPerQuarter;

                    // Фильтруем массив нот перед отрисовкой
                    const visibleNotesSong = this.notesSong.filter((m) => {
                        return (
                            m.absStart + m.length > visibleStartTime &&
                            m.absStart < visibleEndTime
                        );
                    });

                    visibleNotesSong.forEach((m) => {
                        if (!this.activeInstruments.has(m.idInstrument)) return;
                        const el = document.getElementById("k-" + m.idx);
                        if (!el) return;

                        const rect = el.getBoundingClientRect();
                        const lenPx = m.length * this.pixelsPerQuarter;
                        // Позиция ноты зависит от currentPosition
                        const y =
                            h -
                            (m.absStart - this.currentPosition) *
                                this.pixelsPerQuarter -
                            lenPx;

                        // Режим обучения (пауза, если нота достигла края)
                        if (
                            this.learningMode &&
                            !m.passed &&
                            // y + lenPx >= h - lenPx / 2
                            y + lenPx >= h - 21
                        )
                            blocked = true;

                        if (y + lenPx > 0 && y < h) {
                            const colors = this.instColors[m.idInstrument] || {
                                w: "#fff",
                                b: "#000",
                            };
                            ctx.fillStyle = this.keysPianino[m.idx].isWhite
                                ? colors.w
                                : colors.b;
                            ctx.globalAlpha = m.passed ? 0.2 : 1;

                            ctx.beginPath();
                            ctx.roundRect(
                                rect.left - kbRect.left,
                                y,
                                rect.width,
                                lenPx - 2,
                                4,
                            );
                            ctx.fill();
                            ctx.globalAlpha = 1;

                            // Срабатывание звука
                            if (
                                this.isPlaying &&
                                !this.learningMode &&
                                !m.passed &&
                                // y + lenPx >= h - lenPx / 2
                                // y + lenPx >= h - lenPx + 20
                                y + lenPx >= h - 21
                            ) {
                                m.passed = true;
                                this.play(m.idx, m.idInstrument);
                            }
                        }
                    });

                    // 3. ДВИЖЕНИЕ ВРЕМЕНИ
                    if (this.isPlaying && !blocked) {
                        // ВАЖНО: Коэффициент (this.bpm / 60) дает количество четвертей в СЕКУНДУ.
                        // Умножаем на dt (время кадра), чтобы получить смещение за этот кадр.
                        // Если движение кажется медленным, можно добавить множитель скорости.
                        const speedMultiplier = 1.0;
                        this.currentPosition +=
                            (this.bpm / 60) * dt * speedMultiplier;

                        if (this.currentPosition > this.maxPos + 2)
                            this.isPlaying = false;

                        this.updateProgressBar();
                    }

                    if (this.currentPosition >= this.maxPos) {
                        if (this.loopMode) {
                            // Вместо остановки сбрасываем всё к началу
                            this.currentPosition = 0;
                            this.notesSong.forEach((m) => (m.passed = false));
                        }
                    }

                    requestAnimationFrame(() => this.animate());
                },

                seek(e) {
                    const container =
                        document.getElementById("progress-container");
                    if (!container || this.maxPos <= 0) return;

                    // Определяем положение клика относительно ширины контейнера
                    const rect = container.getBoundingClientRect();
                    const clickX = event.clientX - rect.left;
                    const width = rect.width;

                    // Вычисляем новую позицию в треке (в долях/тактах)
                    const ratio = clickX / width;
                    this.currentPosition = ratio * this.maxPos;

                    // Сбрасываем флаги 'passed' у нот, чтобы они могли проиграться снова
                    this.notesSong.forEach((m) => {
                        m.passed = m.absStart < this.currentPosition;
                    });

                    // Сразу визуально обновляем шкалу
                    this.updateProgressBar();
                },

                importMidi(input) {
                    if (!input.files || !input.files.length) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new DataView(e.target.result);
                            if (data.getUint32(0) !== 0x4d546864)
                                throw new Error("Не MIDI файл");

                            const tpq = data.getUint16(12);
                            let offset = 14;
                            const newNotesSong = [];
                            let newBpm = 120;

                            // Храним инструменты для каждого из 16 каналов (по умолчанию 0 - Piano)
                            const channelInstruments = new Array(16).fill(0);
                            const revMap = {
                                0: "ДО",
                                1: "РЕБИМОЛЬ",
                                2: "РЕ",
                                3: "МИБИМОЛЬ",
                                4: "МИ",
                                5: "ФА",
                                6: "СОЛЬБИМОЛЬ",
                                7: "СОЛЬ",
                                8: "ЛЯБИМОЛЬ",
                                9: "ЛЯ",
                                10: "СИБИМОЛЬ",
                                11: "СИ",
                            };

                            while (offset < data.byteLength) {
                                const chunkType = data.getUint32(offset);
                                const chunkLen = data.getUint32(offset + 4);
                                offset += 8;

                                if (chunkType === 0x4d54726b) {
                                    let trackEnd = offset + chunkLen;
                                    let currentTick = 0;
                                    let lastStatus = 0;
                                    const activeNotes = {}; // Ключ теперь будет "нота_канал"

                                    while (offset < trackEnd) {
                                        let delta = 0;
                                        while (true) {
                                            let b = data.getUint8(offset++);
                                            delta = (delta << 7) | (b & 0x7f);
                                            if (!(b & 0x80)) break;
                                        }
                                        currentTick += delta;

                                        let status = data.getUint8(offset);
                                        if (status < 0x80) {
                                            status = lastStatus;
                                        } else {
                                            lastStatus = status;
                                            offset++;
                                        }

                                        const type = status >> 4;
                                        const channel = status & 0x0f;

                                        if (type === 0x9 || type === 0x8) {
                                            // Ноты
                                            const noteNum = data.getUint8(
                                                offset++,
                                            );
                                            const vel = data.getUint8(offset++);
                                            const noteKey =
                                                noteNum + "_" + channel; // Уникальный ключ для канала

                                            if (type === 0x9 && vel > 0) {
                                                activeNotes[noteKey] = {
                                                    tick: currentTick,
                                                    inst:
                                                        channel === 9
                                                            ? 128
                                                            : channelInstruments[
                                                                  channel
                                                              ], // 9 канал - ударные
                                                };
                                            } else if (activeNotes[noteKey]) {
                                                const start =
                                                    activeNotes[noteKey].tick;
                                                const instId =
                                                    activeNotes[noteKey].inst;
                                                newNotesSong.push({
                                                    numTact: Math.floor(
                                                        start / (tpq * 4),
                                                    ),
                                                    pos: Number(
                                                        (
                                                            (start %
                                                                (tpq * 4)) /
                                                            tpq
                                                        ).toFixed(2),
                                                    ),
                                                    note:
                                                        revMap[noteNum % 12] +
                                                        (Math.floor(
                                                            noteNum / 12,
                                                        ) -
                                                            1),
                                                    length: Number(
                                                        (
                                                            (currentTick -
                                                                start) /
                                                            tpq
                                                        ).toFixed(2),
                                                    ),
                                                    idInstrument: instId,
                                                    nameInstrument:
                                                        MIDI_INSTRUMENTS[
                                                            instId
                                                        ] ||
                                                        "Instrument " + instId,
                                                });
                                                delete activeNotes[noteKey];
                                            }
                                        } else if (type === 0xc) {
                                            // Смена инструмента на канале
                                            channelInstruments[channel] =
                                                data.getUint8(offset++);
                                        } else if (
                                            status === 0xf0 ||
                                            status === 0xf7
                                        ) {
                                            // SysEx
                                            let len = 0;
                                            while (true) {
                                                let b = data.getUint8(offset++);
                                                len = (len << 7) | (b & 0x7f);
                                                if (!(b & 0x80)) break;
                                            }
                                            offset += len;
                                        } else if (status === 0xff) {
                                            // Meta
                                            const metaType = data.getUint8(
                                                offset++,
                                            );
                                            let len = 0;
                                            while (true) {
                                                let b = data.getUint8(offset++);
                                                len = (len << 7) | (b & 0x7f);
                                                if (!(b & 0x80)) break;
                                            }
                                            if (metaType === 0x51) {
                                                const mpqn =
                                                    (data.getUint8(offset) <<
                                                        16) |
                                                    (data.getUint8(
                                                        offset + 1,
                                                    ) <<
                                                        8) |
                                                    data.getUint8(offset + 2);
                                                newBpm = Math.round(
                                                    60000000 / mpqn,
                                                );
                                            }
                                            offset += len;
                                        } else if (
                                            type === 0xa ||
                                            type === 0xb ||
                                            type === 0xe
                                        ) {
                                            offset += 2;
                                        } else if (type === 0xd) {
                                            offset += 1;
                                        }
                                    }
                                } else {
                                    offset += chunkLen;
                                }
                            }

                            objMusic.notesSong = newNotesSong;
                            objMusic.bpm = newBpm;
                            this.updateSongData();
                            this.rebuild();

                            objPianino.updateSongFromEditor();
                            alert(
                                "Импорт завершен! Найдено нот: " +
                                    newNotesSong.length,
                            );
                        } catch (err) {
                            console.error(err);
                            alert("Ошибка MIDI: " + err.message);
                        }
                    };
                    reader.readAsArrayBuffer(input.files[0]);

                    //this.currentPosition = -8;
                },

                updateSongFromEditor() {
                    try {
                        objMusic.notesSong = JSON.parse(
                            document.getElementById("editor-area").value,
                        );
                        this.updateSongData();
                        this.rebuild();
                        this.currentPosition = -4;
                        this.updateProgressBar();

                        //this.currentPosition = -4;
                        this.isPlaying = false;
                    } catch (e) {
                        alert("JSON Error!");
                    }
                },

                startWithCountdown() {
                    this.notesSong.forEach((m) => (m.passed = false));

                    this.currentPosition = 0;
                    //this.currentPosition = -4;
                    this.isPlaying = true;
                },

                initCtxWidthHeight() {
                    const container = this.cvs.parentElement;
                    // Get the container's width and height
                    this.cvsWidth = container.clientWidth;
                    this.cvsHeight = container.clientHeight;
                    // Set the canvas width and height
                    this.cvs.width = this.cvsWidth;
                    this.cvs.height = this.cvsHeight;

                    // ctx = canvasEl ? canvasEl.getContext("2d") : null;
                },

                resize() {
                    this.initCtxWidthHeight();

                    this.renderKb();
                },

                switchTab(tabId, btn) {
                    // 1. Скрываем все вкладки
                    document
                        .querySelectorAll(".tab-content")
                        .forEach((t) => t.classList.remove("active"));
                    // 2. Деактивируем все кнопки
                    document
                        .querySelectorAll(".tab-btn")
                        .forEach((b) => b.classList.remove("active"));

                    // 3. Активируем нужную вкладку и кнопку
                    document.getElementById(tabId).classList.add("active");
                    btn.classList.add("active");

                    // 4. Если переключились на пианино, обновляем размер канваса
                    if (tabId === "piano-tab") {
                        this.resize();
                    }
                },
            };

            // Функция сохранения в файл
            function saveMusicToJSON() {
                // Собираем актуальные данные из объекта
                const dataStr = JSON.stringify(objMusic, null, 4);
                const dataUri =
                    "data:application/json;charset=utf-8," +
                    encodeURIComponent(dataStr);

                const exportFileDefaultName = "my_music.json";

                const linkElement = document.createElement("a");
                linkElement.setAttribute("href", dataUri);
                linkElement.setAttribute("download", exportFileDefaultName);
                linkElement.click();
            }

            // Функция загрузки из файла
            function loadMusicFromJSON(input) {
                const file = input.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        const importedData = JSON.parse(e.target.result);

                        // Проверка структуры (наличие bpm и notesSong)
                        if (importedData.bpm && importedData.notesSong) {
                            objMusic.bpm = importedData.bpm;
                            objMusic.notesSong = importedData.notesSong;

                            // Обновляем пианино и текстовое поле редактора
                            //objPianino.updateSongData();
                            objPianino.init();

                            alert("Данные успешно загружены!");
                        } else {
                            alert("Ошибка: Неверный формат JSON файла.");
                        }
                    } catch (err) {
                        alert("Ошибка при чтении файла: " + err.message);
                    }
                    // Очищаем input, чтобы можно было загрузить тот же файл повторно
                    input.value = "";
                };
                reader.readAsText(file);
            }
            function updateRealVH() {
                // Вычисляем 1% от высоты окна
                let vh = window.innerHeight * 0.01;
                // Записываем значение в переменную --vh
                document.documentElement.style.setProperty("--vh", `${vh}px`);
            }

            function toggleFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement
                        .requestFullscreen()
                        .catch((err) =>
                            console.error(`Ошибка: ${err.message}`),
                        );
                } else {
                    document.exitFullscreen();
                }
            }

            // Обновление размеров интерфейса при смене режима
            document.addEventListener("fullscreenchange", () => {
                if (typeof objPianino !== "undefined") {
                    if (objPianino.resize) objPianino.resize();
                    if (objPianino.initCtxWidthHeight)
                        objPianino.initCtxWidthHeight();
                }
            });

            //{{Глобальный контекст, выполнение кода
            // Запускаем при загрузке
            updateRealVH();

            // Обновляем при повороте экрана или изменении размера
            window.addEventListener("resize", updateRealVH);
            window.onload = () => objPianino.init();
            window.addEventListener("keydown", (e) => {
                if (["INPUT", "TEXTAREA"].includes(e.target.tagName)) return;
                const found = objPianino.keysPianino.find(
                    (n) => n.code === e.code,
                );
                if (found && !e.repeat) {
                    e.preventDefault();
                    objPianino.play(found.id);
                }
            });

            //}}Глобальный контекст, выполнение кода
        </script>
    </body>
</html>
