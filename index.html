<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Piano Studio Pro</title>
        <link rel="stylesheet" href="style.css" />

        <script src="songs.js"></script>
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="tabs">
            <button
                class="tab-btn active"
                onclick="objPianino.switchTab('piano-tab', this)"
            >
                ПИАНИНО
            </button>
            <button
                class="tab-btn"
                onclick="objPianino.switchTab('editor-tab', this)"
            >
                РЕДАКТОР
            </button>
            <button
                class="tab-btn"
                onclick="objPianino.switchTab('settings-tab', this)"
            >
                НАСТРОЙКИ
            </button>
        </div>

        <div id="piano-tab" class="tab-content active" style="overflow: hidden">
            <div class="controls">
                <div
                    class="setting-item"
                    style="
                        display: flex;
                        align-items: left;
                        gap: 10px;
                        background: none;
                        border: none;
                        margin: 0;
                    "
                >
                    <div>
                        <label>Tab играет с: </label>
                        <select
                            id="octave-offset-select"
                            onchange="objPianino.setOctaveOffset(this.value)"
                            style="
                                padding: 5px;
                                background: #333;
                                color: #fff;
                                border: 1px solid #555;
                            "
                        >
                            <option value="0">До1</option>
                            <option value="12">До2</option>
                            <option value="24" selected>До3</option>
                            <option value="36">До4</option>
                            <option value="48">До5</option>
                            <option value="60">До6</option>
                        </select>
                    </div>
                    <button
                        class="ctrl-btn"
                        id="playBtn"
                        onclick="objPianino.start()"
                    >
                        <i class="icon-play"></i>
                    </button>
                    <button
                        class="ctrl-btn"
                        id="pauseBtn"
                        onclick="objPianino.pause()"
                    >
                        <i class="icon-pause"></i>
                    </button>
                    <button
                        class="ctrl-btn"
                        id="stopBtn"
                        onclick="objPianino.stop()"
                    >
                        <i class="icon-stop"></i>
                    </button>
                    <label style="font-size: 0.8rem; color: #888">BPM:</label>
                    <input
                        type="number"
                        id="bpm-input"
                        value="60"
                        min="20"
                        max="300"
                        onchange="objPianino.onchangeInputBpm(this.value)"
                        style="
                            width: 50px;
                            background: #333;
                            color: #fff;
                            border: 1px solid #555;
                            padding: 5px;
                            border-radius: 4px;
                        "
                    />
                    <label
                        ><input
                            type="checkbox"
                            id="learn-mode-check"
                            onchange="objPianino.learningMode = this.checked"
                        />🎓 ОБУЧЕНИЕ</label
                    >
                    <label>
                        <input
                            type="checkbox"
                            id="loop-mode-check"
                            onchange="objPianino.loopMode = this.checked"
                        />
                        ЗАЦИКЛИТЬ
                    </label>

                    <!-- Блок режима редактирования -->
                    <div class="edit-controls">
                        <label class="switch">
                            <input type="checkbox" id="edit-mode-check" />
                            <span class="slider"></span>
                        </label>
                        <span class="label-text">Режим редактирования</span>

                        <!-- Вспомогательные кнопки (скрыты по умолчанию) -->
                        <div
                            id="edit-tools"
                            style="display: none; margin-left: 15px"
                        >
                            <select
                                id="note-step"
                                title="Шаг сетки (прилипание)"
                            >
                                <option value="0.125">1/8</option>
                                <option value="0.25" selected>1/4</option>
                                <option value="0.5">1/2</option>
                                <option value="1">1</option>
                            </select>
                            <span
                                style="
                                    font-size: 12px;
                                    color: #ccc;
                                    margin-left: 10px;
                                "
                            >
                                ЛКМ: Создать/Тянуть | ПКМ: Удалить
                            </span>
                        </div>
                    </div>

                    <button
                        class="ctrl-btn"
                        id="fullscreenBtn"
                        onclick="toggleFullScreen()"
                        title="Полноэкранный режим"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#ccc"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                            />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="visualizer-container">
                <div id="progress-container" onclick="objPianino.seek(event)" ;>
                    <div id="progress-fill"></div>
                    <div id="time-display">0:00 / 0:00</div>
                </div>
                <canvas id="visual-canvas"></canvas>
            </div>
            <div id="piano-keyboard"></div>
        </div>

        <div id="editor-tab" class="tab-content">
            <div class="editor-layout">
                <!-- 1 колонка: Редактор нот -->
                <div class="editor-column left-col">
                    <div style="padding: 20px">
                        <div>
                            <div>
                                <!-- Разместите этот блок в первой колонке РЕДАКТОРА, например, перед полем названия песни -->
                                <div>
                                    <label
                                        style="
                                            color: #3498db;
                                            font-weight: bold;
                                        "
                                        >Выбрать песню из базы:</label
                                    >
                                    <select
                                        id="song-database-select"
                                        onchange="
                                            objPianino.selectSongFromDatabase(
                                                this.value,
                                            )
                                        "
                                        style="
                                            width: 100%;
                                            padding: 10px;
                                            background: #222;
                                            color: #fff;
                                            border: 1px solid #444;
                                            border-radius: 4px;
                                            margin-bottom: 10px;
                                            box-sizing: border-box;
                                        "
                                    >
                                        <!-- Элементы <option> будут сгенерированы автоматически при загрузке страницы -->
                                    </select>
                                </div>

                                <label style="color: #3498db; font-weight: bold"
                                    >Название песни:</label
                                >
                                <input
                                    type="text"
                                    id="song-name-input"
                                    value=""
                                    style="
                                        width: 100%;
                                        padding: 10px;
                                        background: #222;
                                        color: #fff;
                                        border: 1px solid #444;
                                        border-radius: 4px;
                                        margin-bottom: 10px;
                                        box-sizing: border-box;
                                    "
                                    onchange="objPianino.NameSong = this.value"
                                />
                            </div>
                            <!-- <div>
                                <label style="color: #3498db; font-weight: bold"
                                    >Название песни:</label
                                >
                                <input type="text" id="song-name-input" ... />
                            </div> -->

                            <button
                                onclick="objPianino.updateSongFromEditor()"
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    /* background: #27ae60; */
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ПРИМЕНИТЬ JSON
                            </button>
                            <input
                                type="file"
                                id="midi-input"
                                accept=".mid, .midi"
                                style="display: none"
                                onchange="objPianino.importMidi(this)"
                            />

                            <!-- Кнопка сохранения -->
                            <button
                                onclick="saveMusicToJSON()"
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    /* background: #27ae60; */
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                СОХРАНИТЬ JSON
                            </button>

                            <!-- Кнопка загрузки -->
                            <input
                                type="file"
                                id="json-upload"
                                accept=".json"
                                style="display: none"
                                onchange="loadMusicFromJSON(this)"
                            />
                            <button
                                onclick="
                                    document
                                        .getElementById('json-upload')
                                        .click()
                                "
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    /* background: #f39c12; */
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ЗАГРУЗИТЬ JSON
                            </button>

                            <button
                                onclick="objPianino.exportToMidiFile()"
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ВЫГРУЗИТЬ MIDI
                            </button>

                            <button
                                onclick="
                                    document
                                        .getElementById('midi-input')
                                        .click()
                                "
                                style="
                                    flex: 1;
                                    margin: 2px;
                                    padding: 12px;
                                    background: #3498db;
                                    color: #fff;
                                    border: none;
                                    cursor: pointer;
                                    font-weight: bold;
                                    border-radius: 4px;
                                "
                            >
                                ЗАГРУЗИТЬ MIDI
                            </button>

                            <textarea
                                id="editor-area"
                                style="
                                    width: 100%;
                                    height: 60vh;
                                    background: #000;
                                    color: #0f0;
                                    font-family: monospace;
                                    padding: 10px;
                                    border: 1px solid #444;
                                "
                                placeholder="JSON данные нот..."
                            ></textarea>
                        </div>
                    </div>
                </div>
                <!-- 2 колонка: Инструменты управления -->
                <div class="editor-column middle-col">
                    <h2 style="color: #3498db">Инструменты и Цвета</h2>
                    <div id="instruments-list"></div>
                </div>

                <!-- 3 колонка: Список MIDI инструментов -->
                <div class="editor-column right-col">
                    <h3>Список всех инструментов MIDI</h3>
                    <div class="table-wrapper">
                        <table id="midi-instruments-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Название</th>
                                </tr>
                            </thead>
                            <tbody id="tools-container">
                                <!-- Сюда JS вставит данные -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="settings-tab" class="tab-content">
            <div style="padding: 0 30px">
                <h2 style="color: #3498db">Настройки клавиатуры</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Имя (idName)</th>
                                <th>Частота (Hz)</th>
                                <th>Клавиша (e.code)</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody id="notes-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
